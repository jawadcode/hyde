<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/post.css">
    <title>{{ front_matter.title }} | {{ config.name }}</title>
  </head>
  <body lang="{{ front_matter.language }}" data-theme="default">
    <h1 class="post-header">{{ front_matter.title }}</h1>
    <h5 class="post-timestamp">
      <time datetime="{{ front_matter.datetime }}">{{ front_matter.datetime }}</time>
    </h5>
    {{ content }}
  </body>
</html>
